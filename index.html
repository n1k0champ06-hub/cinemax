<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- DNS prefetch & preconnect for all image/API origins -->
    <link rel="dns-prefetch" href="https://ophim1.com" />
    <link rel="dns-prefetch" href="https://phimapi.com" />
    <link rel="dns-prefetch" href="https://phim.nguonc.com" />
    <link rel="dns-prefetch" href="https://phimimg.com" />
    <link rel="dns-prefetch" href="https://cinemaos.tech" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://ophim1.com" crossorigin />
    <link rel="preconnect" href="https://phimapi.com" crossorigin />
    <link rel="preconnect" href="https://phim.nguonc.com" crossorigin />
    <link rel="preconnect" href="https://phimimg.com" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Mobile viewport: no zoom delay, correct scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <title>Cinemax</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dwbbs7rho/image/upload/v1779716516/Elegant_Marquee_Style_Logo_with_Deep_Crimson_C_c2sulc.png" />
    
    <!-- PWA Optimization -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dwbbs7rho/image/upload/v1779716516/Elegant_Marquee_Style_Logo_with_Deep_Crimson_C_c2sulc.png" />

    <!-- Cloudflare Web Analytics Placeholder -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CF_TOKEN"}'></script>

    <style>
      #pwa-splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999999;
        background-color: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        pointer-events: none;
        -webkit-tap-highlight-color: transparent;
      }
      #pwa-splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .splash-logo-wrapper {
        position: relative;
        width: 104px;
        height: 104px;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      /* Dim base layer of 3D Glasses logo — no filter grayscale blur for ultra-sharp mobile rendering */
      .splash-logo-base {
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0.18;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
      }
      /* Clean vibrant HD 3D glasses logo loading layer moving Left to Right (Sharp crisp edges) */
      .splash-logo-fill {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 1;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
        clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
        will-change: clip-path;
        animation: logoFillLeftToRight 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes logoFillLeftToRight {
        0% {
          clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
        }
        100% {
          clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }
      }
    </style>
  </head>

  <body>
    <!-- Ultra-Sharp Crisp HD 3D Glasses Left-to-Right Animated Splash Screen -->
    <div id="pwa-splash-screen">
      <div class="splash-logo-wrapper">
        <img
          src="https://res.cloudinary.com/dwbbs7rho/image/upload/v1779716516/Elegant_Marquee_Style_Logo_with_Deep_Crimson_C_c2sulc.png"
          class="splash-logo-base"
          alt="Cinemax"
        />
        <img
          src="https://res.cloudinary.com/dwbbs7rho/image/upload/v1779716516/Elegant_Marquee_Style_Logo_with_Deep_Crimson_C_c2sulc.png"
          class="splash-logo-fill"
          alt="Cinemax Loading"
        />
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Global PWA Splash Screen dismiss handler
      let pwaSplashDismissed = false;
      window.hidePWASplash = function() {
        if (pwaSplashDismissed) return;
        pwaSplashDismissed = true;
        const splash = document.getElementById('pwa-splash-screen');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(() => splash.remove(), 450);
        }
      };

      // Fallback timer: Hide splash screen after 1.8 seconds max if React loads fast
      setTimeout(() => {
        window.hidePWASplash();
      }, 1800);

      // Automatic Cache Purger & Version Sync for instant UI updates
      const CURRENT_BUILD_VER = '2026-07-21-v16';
      const savedVer = localStorage.getItem('cinemax_app_version');
      if (savedVer !== CURRENT_BUILD_VER) {
        localStorage.setItem('cinemax_app_version', CURRENT_BUILD_VER);
        if ('caches' in window) {
          caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
      }

      // Quick shortcut: Accessing site with ?clearCache=true wipes 100% of browser cache
      if (window.location.search.includes('clearCache=true') || window.location.search.includes('purgeCache=true')) {
        if ('caches' in window) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
        window.location.href = window.location.pathname;
      }

      // Service Worker Registration for PWA installation
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker registered:', reg.scope);
              reg.update();
            })
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
