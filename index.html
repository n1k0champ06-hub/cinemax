<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- DNS prefetch & preconnect for all image/API origins -->
    <link rel="dns-prefetch" href="https://ophim1.com" />
    <link rel="dns-prefetch" href="https://phimapi.com" />
    <link rel="dns-prefetch" href="https://phim.nguonc.com" />
    <link rel="dns-prefetch" href="https://phimimg.com" />
    <link rel="dns-prefetch" href="https://cinemaos.tech" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://ophim1.com" crossorigin />
    <link rel="preconnect" href="https://phimapi.com" crossorigin />
    <link rel="preconnect" href="https://phim.nguonc.com" crossorigin />
    <link rel="preconnect" href="https://phimimg.com" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Mobile viewport: no zoom delay, correct scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <title>Cinemax</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dwbbs7rho/image/upload/v1779716516/Elegant_Marquee_Style_Logo_with_Deep_Crimson_C_c2sulc.png" />
    
    <!-- PWA Optimization -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E50914" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dwbbs7rho/image/upload/v1779716516/Elegant_Marquee_Style_Logo_with_Deep_Crimson_C_c2sulc.png" />

    <!-- Cloudflare Web Analytics Placeholder -->
    <!-- Thay 'YOUR_CF_TOKEN' bằng Web Analytics Token của bạn trên Cloudflare Dashboard -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CF_TOKEN"}'></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Automatic Cache Purger & Version Sync for instant UI updates
      const CURRENT_BUILD_VER = '2026-07-18-v10';
      const savedVer = localStorage.getItem('cinemax_app_version');
      if (savedVer !== CURRENT_BUILD_VER) {
        localStorage.setItem('cinemax_app_version', CURRENT_BUILD_VER);
        if ('caches' in window) {
          caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
      }

      // Quick shortcut: Accessing site with ?clearCache=true wipes 100% of browser cache
      if (window.location.search.includes('clearCache=true') || window.location.search.includes('purgeCache=true')) {
        if ('caches' in window) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
        window.location.href = window.location.pathname;
      }

      // Service Worker Registration for PWA installation
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker registered:', reg.scope);
              reg.update();
            })
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
