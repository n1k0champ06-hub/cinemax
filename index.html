<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- DNS prefetch & preconnect for all image/API origins -->
    <link rel="dns-prefetch" href="https://ophim1.com" />
    <link rel="dns-prefetch" href="https://phimapi.com" />
    <link rel="dns-prefetch" href="https://phim.nguonc.com" />
    <link rel="dns-prefetch" href="https://phimimg.com" />
    <link rel="dns-prefetch" href="https://cinemaos.tech" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://ophim1.com" crossorigin />
    <link rel="preconnect" href="https://phimapi.com" crossorigin />
    <link rel="preconnect" href="https://phim.nguonc.com" crossorigin />
    <link rel="preconnect" href="https://phimimg.com" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Mobile viewport: no zoom delay, correct scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <title>Cinemax</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dwbbs7rho/image/upload/v1779716516/Elegant_Marquee_Style_Logo_with_Deep_Crimson_C_c2sulc.png" />
    
    <!-- PWA Optimization -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dwbbs7rho/image/upload/v1779716516/Elegant_Marquee_Style_Logo_with_Deep_Crimson_C_c2sulc.png" />

    <!-- Cloudflare Web Analytics Placeholder -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CF_TOKEN"}'></script>

    <style>
      #pwa-splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999999;
        background-color: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        pointer-events: none;
        -webkit-tap-highlight-color: transparent;
      }
      #pwa-splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      
      /* Smooth seamless fade-in for SVG vector glasses on pure black background */
      .splash-logo-wrapper {
        position: relative;
        width: 130px;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        animation: splashContentFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes splashContentFadeIn {
        0% { opacity: 0; transform: scale(0.96); }
        100% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>

  <body>
    <!-- Ultra-Sharp 4K SVG Vector 3D Glasses Left-to-Right Animated Splash Screen -->
    <div id="pwa-splash-screen">
      <div class="splash-logo-wrapper">
        <svg viewBox="0 0 240 140" width="130" height="75" style="overflow: visible;">
          <defs>
            <clipPath id="glasses-fill-clip">
              <rect x="0" y="0" width="0" height="140">
                <animate attributeName="width" from="0" to="240" dur="1.35s" begin="0.05s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
              </rect>
            </clipPath>
          </defs>

          <!-- Dimmed Base Vector Glasses (Opacity 0.18) -->
          <g opacity="0.18">
            <!-- Left temple stem -->
            <path d="M 22 64 C 46 52, 78 44, 108 44" fill="none" stroke="#F5E6CA" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 22 64 C 46 52, 78 44, 108 44" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
            
            <!-- Left Lens Frame -->
            <polygon points="104,38 164,40 158,88 98,82" fill="#F5E6CA" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
            <!-- Right Lens Frame -->
            <polygon points="164,40 208,44 200,91 158,88" fill="#E8D5B7" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>

            <!-- Left Blue Lens -->
            <polygon points="111,44 156,45 151,81 106,76" fill="#1C2B36" stroke="#000000" stroke-width="2"/>
            <!-- Right Red Lens -->
            <polygon points="167,46 201,49 194,84 162,81" fill="#E50914" stroke="#000000" stroke-width="2"/>
          </g>

          <!-- Crisp Full Color Vector Glasses (Reveals Left to Right via SVG Native ClipPath) -->
          <g clip-path="url(#glasses-fill-clip)">
            <!-- Left temple stem -->
            <path d="M 22 64 C 46 52, 78 44, 108 44" fill="none" stroke="#F5E6CA" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 22 64 C 46 52, 78 44, 108 44" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
            
            <!-- Left Lens Frame -->
            <polygon points="104,38 164,40 158,88 98,82" fill="#F5E6CA" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
            <!-- Right Lens Frame -->
            <polygon points="164,40 208,44 200,91 158,88" fill="#E8D5B7" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>

            <!-- Left Blue Lens -->
            <polygon points="111,44 156,45 151,81 106,76" fill="#1C2B36" stroke="#000000" stroke-width="2"/>
            <!-- Right Red Lens -->
            <polygon points="167,46 201,49 194,84 162,81" fill="#E50914" stroke="#000000" stroke-width="2"/>
          </g>
        </svg>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Global PWA Splash Screen dismiss handler
      let pwaSplashDismissed = false;
      window.hidePWASplash = function() {
        if (pwaSplashDismissed) return;
        pwaSplashDismissed = true;
        const splash = document.getElementById('pwa-splash-screen');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(() => splash.remove(), 450);
        }
      };

      // Fallback timer: Hide splash screen after 1.8 seconds max if React loads fast
      setTimeout(() => {
        window.hidePWASplash();
      }, 1800);

      // Automatic Cache Purger & Version Sync for instant UI updates
      const CURRENT_BUILD_VER = '2026-07-21-v20';
      const savedVer = localStorage.getItem('cinemax_app_version');
      if (savedVer !== CURRENT_BUILD_VER) {
        localStorage.setItem('cinemax_app_version', CURRENT_BUILD_VER);
        if ('caches' in window) {
          caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
      }

      // Quick shortcut: Accessing site with ?clearCache=true wipes 100% of browser cache
      if (window.location.search.includes('clearCache=true') || window.location.search.includes('purgeCache=true')) {
        if ('caches' in window) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
        window.location.href = window.location.pathname;
      }

      // Service Worker Registration for PWA installation
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker registered:', reg.scope);
              reg.update();
            })
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
