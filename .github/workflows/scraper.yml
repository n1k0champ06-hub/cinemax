name: 🕷️ Movie Scraper Bot

on:
  schedule:
    # Chạy mỗi 6 tiếng: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Source tier (a=kkphim / b=ophim / c=nguonc / all)'
        required: false
        default: 'all'
      pages:
        description: 'Số trang cào mỗi nguồn'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run — fetch nhưng không ghi vào DB'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: scraper-pip-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: scraper-pip-

      - name: 🔧 Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: 🕷️ Run Scraper
        run: |
          python -m scraper.main \
            --tier ${{ github.event.inputs.tier || 'all' }} \
            --pages ${{ github.event.inputs.pages || '3' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }} \
            --verbose
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          PROXY_URL: ${{ secrets.PROXY_URL }}

      - name: 📊 Upload scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: scraper/logs/
          retention-days: 7
          if-no-files-found: ignore
