# Cinemax Scraper — Source Definitions
# Each source defines API endpoints, fetcher preferences, and metadata.
# Add new sources by copying a block and adjusting the URLs.

sources:
  ophim:
    name: "OPhim"
    enabled: true
    base_url: "https://ophim1.com"
    api:
      list: "https://ophim1.com/danh-sach/phim-moi-cap-nhat?page={page}"
      detail: "https://ophim1.com/phim/{slug}"
    # Referer to send when playing m3u8 streams from this source
    referer: "https://ophim1.com/"
    # Preferred fetcher tiers (tried in order): httpx → scrapling → stealthy
    fetcher_tiers:
      - httpx
      - scrapling
      - stealthy
    # Rate limiting: seconds between requests
    rate_limit: 0.5
    # Maximum pages to crawl per run (0 = unlimited)
    max_pages: 0
    # Default quality label when not specified in API response
    default_quality: "1080p"

  kkphim:
    name: "KKPhim"
    enabled: true
    base_url: "https://phimapi.com"
    api:
      list: "https://phimapi.com/danh-sach/phim-moi-cap-nhat?page={page}"
      detail: "https://phimapi.com/phim/{slug}"
    referer: "https://phimapi.com/"
    fetcher_tiers:
      - httpx
      - scrapling
      - stealthy
    rate_limit: 0.5
    max_pages: 0
    default_quality: "1080p"

